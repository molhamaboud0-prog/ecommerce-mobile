name: EAS Build

# Builds run only from GitHub — not from a local machine.
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
          - development

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (${{ github.event.inputs.profile || 'production' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK with EAS
        run: |
          eas build \
            --platform android \
            --profile "${{ github.event.inputs.profile || 'production' }}" \
            --non-interactive \
            --no-wait
