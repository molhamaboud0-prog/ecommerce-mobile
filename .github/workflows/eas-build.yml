name: EAS Build

# Builds run only from GitHub — not from a local machine.
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
          - development

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (${{ github.event.inputs.profile || 'production' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Verify Expo auth and projectId
        run: |
          set -euo pipefail
          if ! eas whoami; then
            echo "::error::EAS authentication failed. Update the EXPO_TOKEN repository secret with a valid Expo access token (expo.dev → Access tokens), then re-run the workflow."
            exit 1
          fi
          if ! node -e '
            const app = require("./app.json");
            const id = app?.expo?.extra?.eas?.projectId;
            if (!id) {
              console.error("Missing expo.extra.eas.projectId in app.json.");
              console.error("Run locally: npx eas-cli login && npx eas-cli init");
              console.error("Then commit app.json and push again.");
              process.exit(1);
            }
            console.log("EAS projectId:", id);
          '; then
            exit 1
          fi

      - name: Build Android APK with EAS
        run: |
          eas build \
            --platform android \
            --profile "${{ github.event.inputs.profile || 'production' }}" \
            --non-interactive \
            --no-wait
